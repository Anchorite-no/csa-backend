<script type="text/javascript">
	jQuery(function($) {
		//解决页签模式下，加载jquery.jqGrid.additional.js和jquery.jqgrid.src.js文件时searchGrid方法被覆盖，导致无法查询问题
		var waitAndResetSearchFunc = function() {
			var iWaitCount = 1, $yhgnPage = $("#yhgnPage");
			setTimeout(function() {
				if (iWaitCount < 50 &&
						$yhgnPage.find("#loading_status").defined()) {
					iWaitCount++;
					setTimeout(arguments.callee, 200);
				} else {
					window.search = function(tabId, jsonMap) {
						var $tabGrid = $("#" + tabId);
						if(jsonMap){
							$tabGrid.jqGrid('setGridParam',{
								datatype: 'json',
								postData : jsonMap ||{},
								page	  : 1
							}).trigger('reloadGrid');
						}else{
							$tabGrid.jqGrid().trigger('reloadGrid');
						}
					}
				}
			}, 500);
		};

		if ($("#navbar-tabs").length > 0) {
			$("#navbar-tabs li a").removeAttr("onClick").click(function(e) {
				$(".ui-jqdialog:not(:visible)").remove(); //删除隐藏的ui-jqdialog
				var $curTab = $(e.target), $preTab = $("#navbar-tabs").find("li.active a");
				if (!$preTab.defined() || ($preTab[0] != $curTab[0])) {
					var paramData = {},
						arrParams = $.founded($curTab.data("params")) ? $curTab.data("params").split(",") : [];
					for (var i = 0, iLen = arrParams.length; i < iLen; i++) {
						if ($.founded(arrParams[i])) {
							paramData[arrParams[i]] = $curTab.data(arrParams[i]);
						}
					}
					$("#navbar-tabs").find("li").removeClass("active");
					onClickMenu.call($curTab[0], $curTab.data("dyym"), $curTab.data("gnmkdm"), paramData);
					waitAndResetSearchFunc();
					/*
					if ($("#gnmkdmKey").val().indexOf("N153005") == -1) {
						var title = $curTab.text().trim();
						$("#navbar_container").find("span.sr-only, a.navbar-brand").text(title);	
					}
					*/
				}
			});
			$firstTab = $("#navbar-tabs li:eq(0) a").tab('show');
			$.founded($firstTab.data("gnmkdm")) && $("#gnmkdmKey").val($firstTab.data("gnmkdm"));
		}
		
		setMinheight();
		
		$('#yhgnPage').resize(function(){
			var minHeight  = $(this).data('min-height');
			var innerHeight =  $('#innerContainer').outerHeight(true);
			//console.log("minHeight:" + minHeight + ",innerHeight:" + innerHeight);
			$(this).css('min-height', Math.max(minHeight, innerHeight));
		});
		
		function setMinheight(){
			//计算grid页面高度
			var docuemntHeight = $(document).height(),
				topHeight = $('header').outerHeight(),
				footerHeight = $('.footer').outerHeight(),
				tabHeight = $("#navbar-tabs").defined() ? $("#navbar-tabs").parent().outerHeight() : 0,
				containerHeight = docuemntHeight - topHeight - footerHeight - tabHeight -60;
			$('#yhgnPage').css('min-height',containerHeight).data('min-height',containerHeight);
		}
	});
</script>
